run_id: masses_exclusions_pysr_search_v1
dataset_id: masses_exclusions
dataset_config: configs/datasets/masses_exclusions.yaml
raw_path: data/raw/masses_exclusions.csv
task_type: pysr_symbolic_score_search
features:
  - mchi1
  - mchipm1
target: exclusion
positive_label: requires_review
test_size: 0.2
split_method: stratified
random_seed: 42
auc_rule: continuous_scores_only
objective: maximize_roc_auc
expression_simplicity: not_initial_hard_constraint
output_dir: outputs/runs/masses_exclusions_pysr_search_v1/
review_status: draft
pysr_options:
  niterations: 100
  maxsize: 40
  populations: 20
  parsimony: 0.0
  binary_operators:
    - "+"
    - "-"
    - "*"
    - "/"
  unary_operators: []
pysr_search_notes:
  - allow larger maxsize than historical script
  - record operators
  - record parsimony
  - record niterations
  - record populations
  - record random seed
  - save discovered expressions and validation scores
