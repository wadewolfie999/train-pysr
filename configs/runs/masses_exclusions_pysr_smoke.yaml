run_id: masses_exclusions_pysr_smoke_v4
dataset_id: masses_exclusions
dataset_config: configs/datasets/masses_exclusions.yaml
raw_path: data/raw/masses_exclusions.csv
task_type: pysr_symbolic_score_search
features:
  - mchi1
  - mchipm1
target: exclusion
positive_label: requires_review
test_size: 0.2
split_method: stratified
random_seed: 42
auc_rule: continuous_scores_only
objective: squared_error_symbolic_score_surrogate_with_roc_auc_evaluation
expression_simplicity: smoke_test_only
output_dir: outputs/runs/masses_exclusions_pysr_smoke_v4/
review_status: draft
run_policy:
  require_clean_worktree: false
  allow_overwrite: false
  record_git_diff_status: true
  smoke_test: true
runtime:
  julia_num_threads: 1
  python_juliacall_handle_signals: "yes"
  omp_num_threads: 1
  mkl_num_threads: 1
  openblas_num_threads: 1
  pythonunbuffered: true
reference:
  fixed_split_hist_gradient_boosting_auc: 0.9757422365348225
  comparison_status: provisional_unverified_pending_review
pysr_options:
  niterations: 1
  maxsize: 8
  populations: 2
  population_size: 16
  parsimony: 0.0
  timeout_in_seconds: 120
  parallelism: serial
  precision: 32
  deterministic: true
  warm_start: false
  temp_equation_file: false
  delete_tempfiles: false
  model_selection: best
  elementwise_loss: "loss(prediction, target, weight) = weight * (prediction - target)^2"
  binary_operators:
    - "+"
    - "-"
    - "*"
    - "/"
  unary_operators: []
pysr_search_notes:
  - smoke test only; not a scientific performance run
  - weighted squared-error fitting on binary 0/1 targets is used as a symbolic continuous-score surrogate, not direct AUC optimization
  - evaluate ROC-AUC from continuous PySR predictions only
  - save per-row test labels and continuous scores for independent AUC recomputation
  - never use Final_CLs as a feature or target
  - never overwrite existing run outputs
  - record exact Git commit and dirty worktree status for review
